<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON VULN SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');

        :root {
            --bg: linear-gradient(135deg, #0a0a0a, #1a0033, #000000);
            --text: #e0e0e0;
            --muted: #9ca3af;
            --accent: #22d3ee;
            --accent-2: #a855f7;
            --neon-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent-2);
            --card-bg: rgba(255,255,255,0.04);
            --glass-bg: rgba(255,255,255,0.05);
            --scan-gradient: linear-gradient(90deg, #ec4899, #a855f7, #22d3ee);
            --top-progress-gradient: linear-gradient(90deg,#06b6d4,#7c3aed);
        }

        /* Light theme overrides */
        [data-theme="light"] {
            --bg: linear-gradient(135deg, #f8fafc, #eef2ff);
            --text: #0f172a;
            --muted: #475569;
            --accent: #0ea5b7;
            --accent-2: #7c3aed;
            --neon-shadow: 0 0 8px rgba(14,165,183,0.12), 0 0 16px rgba(124,58,237,0.08);
            --card-bg: rgba(255,255,255,0.85);
            --glass-bg: rgba(255,255,255,0.6);
            --scan-gradient: linear-gradient(90deg, #ef476f, #7c3aed, #06b6d4);
            --top-progress-gradient: linear-gradient(90deg,#06b6d4,#7c3aed);
        }

        /* Dark theme explicit (keeps existing look) */
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #0a0a0a, #1a0033, #000000);
            --text: #e0e0e0;
            --muted: #9ca3af;
            --accent: #22d3ee;
            --accent-2: #a855f7;
            --neon-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent-2);
            --card-bg: rgba(255,255,255,0.04);
            --glass-bg: rgba(255,255,255,0.05);
            --scan-gradient: linear-gradient(90deg, #ec4899, #a855f7, #22d3ee);
            --top-progress-gradient: linear-gradient(90deg,#06b6d4,#7c3aed);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .neon-text { text-shadow: var(--neon-shadow); }
        .neon-border { border: 2px solid var(--accent); box-shadow: 0 0 25px var(--accent); }
        .module-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card-bg);
        }
        .module-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 40px var(--accent-2);
        }
        .scan-btn {
            background: var(--scan-gradient);
            transition: all 0.3s;
        }
        .scan-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(236,72,153,0.3);
        }
        .severity-high { border-left: 6px solid #ef4444; background: rgba(239, 68, 68, 0.12); }
        .severity-medium { border-left: 6px solid #f59e0b; background: rgba(245, 158, 11, 0.12); }
        .severity-low { border-left: 6px solid #22c55e; background: rgba(34, 197, 94, 0.12); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); }
        /* Top progress bar (hidden until real server-side progress is available) */
        #top-progress { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 60; display: none; }
        #top-progress-bar { height: 100%; width: 0%; background: var(--top-progress-gradient); transition: width 300ms ease; box-shadow: 0 0 12px rgba(124,58,237,0.45); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top fixed progress bar (page-level / scan indicator) -->
    <div id="top-progress" aria-hidden="true"><div id="top-progress-bar"></div></div>

<div class="flex items-center justify-center min-h-screen p-8">
    <div class="w-full max-w-3xl glass p-8 rounded-3xl">
        <div class="flex items-center justify-center gap-3 mb-6">
            <i class="fas fa-skull-crossbones text-3xl text-cyan-400"></i>
            <div>
                <h1 class="text-2xl font-bold tracking-widest neon-text text-center">NEON VULN SCANNER</h1>
                <p class="text-xs text-cyan-400 tracking-[3px] text-center">v1.0</p>
            </div>
        </div>

        <form id="scanForm" method="POST" class="space-y-6" autocomplete="off">
            <!-- Hidden marker to ensure scans are started only via the launch button -->
            <input type="hidden" name="manual" id="manualInput" value="0">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2 text-center">TARGET</label>
                <div class="flex justify-center">
                    <input type="url" id="url" name="url" required
                           class="w-full max-w-xl bg-zinc-900 border border-cyan-500/50 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-400 placeholder-gray-500"
                           placeholder="https://target.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-4 text-center">SELECT MODULES</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 justify-items-center">
                    {% for key, display in modules %}
                    <label class="module-card flex flex-col items-center gap-2 bg-zinc-900/70 hover:bg-zinc-800 border border-transparent hover:border-purple-500 p-4 rounded-2xl cursor-pointer text-center">
                        <input type="checkbox" name="modules" value="{{ key }}" class="w-5 h-5 accent-cyan-400">
                        <div class="text-sm font-semibold">{{ display.split('(')[0] }}</div>
                        <div class="text-xs text-gray-500">{{ display.split('(')[1] if '(' in display else '' }}</div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="flex justify-center mt-6">
                <button type="submit" id="scanBtn"
                        class="scan-btn w-80 text-white font-bold text-lg py-4 rounded-3xl flex items-center justify-center gap-3 shadow-2xl">
                    <i class="fas fa-bolt"></i>
                    <span>LAUNCH DEEP SCAN</span>
                </button>
            </div>
        </form>

        <!-- Progress (kept but only shown when server provides scan_id) -->
        <div id="scan-progress" class="hidden mt-6 glass border border-cyan-400/30 rounded-3xl p-6">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-cyan-400">SCANNING IN PROGRESS...</span>
                <span id="progress-text">0% • Initializing</span>
            </div>
            <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-400 to-purple-500 w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Export buttons (appear only after scan complete) -->
        <div id="export-buttons" class="hidden mt-6 flex gap-4 justify-center">
            <button onclick="exportReport('txt')" class="py-3 px-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-semibold">📄 Export as TXT</button>
            <button onclick="exportReport('json')" class="py-3 px-6 bg-violet-600 hover:bg-violet-500 rounded-3xl font-semibold">💾 Export as JSON</button>
        </div>

        <!-- Short instructions at bottom -->
        <div class="mt-8 text-sm text-center text-gray-400">
            Enter a full URL, pick modules, and click "Launch Deep Scan". Results are saved to the reports folder.
        </div>
    </div>
</div>

<script>
// Tailwind script already loaded
// Theme handling: persistent day/night mode
function updateThemeUI(theme) {
    const icon = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (!icon || !label) return;
    if (theme === 'light') {
        icon.className = 'fas fa-sun';
        label.textContent = 'Light Mode';
    } else {
        icon.className = 'fas fa-moon';
        label.textContent = 'Dark Mode';
    }
}

function setTheme(theme) {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('vuln_theme', theme); } catch (e) {}
    updateThemeUI(theme);
}

function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
}

function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem('vuln_theme'); } catch (e) { saved = null; }
    if (saved === 'light' || saved === 'dark') {
        setTheme(saved);
        return;
    }
    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    setTheme(prefersLight ? 'light' : 'dark');
}

// Server-provided flags for polling
const SERVER_SCANNING = {{ scanning|tojson }};
const SCAN_ID = {{ scan_id|tojson }};

document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    if (SERVER_SCANNING && SCAN_ID) {
        startPolling(SCAN_ID);
    }
});



let pollInterval = null;

// Top progress helpers (minimal, used only when server provides a real scan id)
function setTopProgress(p) {
    const top = document.getElementById('top-progress-bar');
    if (top) top.style.width = Math.min(100, Math.max(0, Math.floor(p))) + '%';
}
function showTopProgress() { const tp = document.getElementById('top-progress'); if (tp) tp.style.display = 'block'; }
function hideTopProgress(delay = 500) { setTimeout(() => { const tp = document.getElementById('top-progress'); if (tp) { setTopProgress(0); tp.style.display = 'none'; } }, delay); }

// Polling the backend for real scan progress
async function startPolling(id) {
    document.getElementById('scan-progress').classList.remove('hidden');
    document.getElementById('scanBtn').disabled = true;
    showTopProgress();
    setTopProgress(0);
    pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`/status/${id}`);
            if (!res.ok) return;
            const data = await res.json();
            const p = data.progress || 0;
            const pct = Math.floor(p);
            document.getElementById('progress-bar').style.width = pct + '%';
            setTopProgress(pct);
            document.getElementById('progress-text').textContent = `${pct}% • ${data.message || ''}`;
            if (data.status === 'completed' || data.status === 'error') {
                clearInterval(pollInterval);
                document.getElementById('scanBtn').disabled = false;
                if (data.status === 'completed') {
                    confetti({ particleCount: 180, spread: 90, origin: { y: 0.6 } });
                    const ex = document.getElementById('export-buttons');
                    if (ex) ex.classList.remove('hidden');
                }
                setTimeout(() => { hideTopProgress(600); }, 800);
            }
        } catch (e) {
            console.error('Polling error', e);
        }
    }, 1000);
}

// Prevent automatic form submissions (require explicit button click)
const scanForm = document.getElementById('scanForm');
const scanBtn = document.getElementById('scanBtn');
const manualInput = document.getElementById('manualInput');
if (scanBtn) {
    scanBtn.addEventListener('click', function() {
        // mark that this submit was manual (button-click)
        if (manualInput) manualInput.value = '1';
    });
}

if (scanForm) {
    scanForm.addEventListener('submit', function(e) {
        // only allow submission if user clicked the launch button (manualInput == '1')
        if (!manualInput || manualInput.value !== '1') {
            e.preventDefault();
            return false;
        }
        // proceed with real submission
        if (scanBtn) scanBtn.disabled = true;
    });
}

// Copy PoC
function copyPoC(btn) {
    const text = btn.parentElement.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy PoC'; }, 1800);
    });
}

// Filter results (simple)
function filterResults(level) {
    alert(`Filtered to ${level} severity (demo - full filter coming soon)`);
}

// Export buttons (demo)
function exportReport(type) {
    alert(`✅ ${type.toUpperCase()} report downloaded!\n\n(Full export logic can be added in app.py later)`);
}

</script>
</body>
</html>
